name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Secret scan
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            zricethezav/gitleaks:v8.30.1 \
            detect --source . --no-banner --redact --verbose

  build:
    needs: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install system OCR tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends poppler-utils tesseract-ocr
      - name: Install
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade "pip>=26.1"
          .venv/bin/pip install -e ".[dev,all]"
      - name: Verify release tag matches package version
        run: |
          .venv/bin/python - <<'PY'
          import os
          import sys

          from librarian.version import __version__

          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{__version__}"
          if tag != expected:
              print(f"release tag {tag!r} does not match package version {expected!r}")
              sys.exit(1)
          PY
      - name: Verify changelog is ready for release
        run: .venv/bin/python .github/scripts/check_changelog_ready.py --version "$GITHUB_REF_NAME"
      - name: Doctor
        run: .venv/bin/librarian doctor --strict
      - name: Check
        run: |
          .venv/bin/ruff check .
          .venv/bin/pyright
          .venv/bin/pytest
      - name: Dependency audit
        run: .venv/bin/pip-audit --progress-spinner off --skip-editable
      - name: Build distributions
        run: |
          rm -rf dist
          .venv/bin/python -m build
      - name: Export dependency constraints
        run: .venv/bin/python .github/scripts/export_constraints.py --output constraints.txt
      - name: Smoke install wheel
        run: |
          python -m venv "$RUNNER_TEMP/librarian-wheel-smoke"
          WHEEL="$(ls dist/*.whl)"
          "$RUNNER_TEMP/librarian-wheel-smoke/bin/python" -m pip install -c constraints.txt "$WHEEL[all]"
          "$RUNNER_TEMP/librarian-wheel-smoke/bin/librarian" version
      - name: Attest distributions
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"
      - name: Generate SBOM
        run: .venv/bin/cyclonedx-py environment --output-format JSON --output-file sbom.json
      - name: Collect Mac app DMGs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Releases are immutable once published, so every asset must be in
          # the single create call below. Wait for the Mac App workflow run
          # on this commit and pull its DMG artifacts.
          mkdir -p dmgs
          for attempt in $(seq 1 60); do
            RUN_ID="$(gh run list --repo "${{ github.repository }}" \
              --workflow macapp.yml --commit "$GITHUB_SHA" \
              --json databaseId,status \
              --jq '.[] | select(.status == "completed") | .databaseId' | head -n 1)"
            if [ -n "$RUN_ID" ]; then
              CONCLUSION="$(gh run view "$RUN_ID" --repo "${{ github.repository }}" \
                --json conclusion --jq .conclusion)"
              if [ "$CONCLUSION" != "success" ]; then
                echo "Mac App run $RUN_ID concluded: $CONCLUSION" >&2
                exit 1
              fi
              gh run download "$RUN_ID" --repo "${{ github.repository }}" --dir dmgs
              break
            fi
            echo "Waiting for the Mac App workflow run (attempt $attempt)..."
            sleep 30
          done
          test -f dmgs/Librarian-AppleSilicon/Librarian-AppleSilicon.dmg
          test -f dmgs/Librarian-Intel/Librarian-Intel.dmg
      - name: Generate checksums
        run: |
          sha256sum dist/* sbom.json constraints.txt > SHA256SUMS.txt
          sha256sum dmgs/*/*.dmg >> SHA256SUMS.txt
      - name: Verify checksums
        run: sha256sum --check SHA256SUMS.txt
      - name: Attest release metadata
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            sbom.json
            constraints.txt
            SHA256SUMS.txt
      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ github.ref_name }}
          retention-days: 30
          path: |
            dist/*
            sbom.json
            constraints.txt
            SHA256SUMS.txt
      - name: Login to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          docker build -t "$IMAGE:${{ github.ref_name }}" .
      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
          format: "sarif"
          output: "trivy-image.sarif"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          exit-code: "1"
      - name: Upload image scan
        if: ${{ always() && hashFiles('trivy-image.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-image.sarif"
      - name: Push image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          docker push "$IMAGE:${{ github.ref_name }}"
          case "${{ github.ref_name }}" in
            *a*|*b*|*rc*) ;;
            *)
              docker tag "$IMAGE:${{ github.ref_name }}" "$IMAGE:latest"
              docker push "$IMAGE:latest"
              ;;
          esac
      - name: Resolve image digest
        id: image-digest
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          DIGEST="$(docker buildx imagetools inspect "$IMAGE:${{ github.ref_name }}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
      - name: Attest image
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: "ghcr.io/${{ github.repository }}"
          subject-digest: "${{ steps.image-digest.outputs.digest }}"
          push-to-registry: true
      - name: Extract release notes
        run: .venv/bin/python .github/scripts/release_notes.py --version "${{ github.ref_name }}" --output release-notes.md
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          PRERELEASE_FLAG=""
          case "$REF_NAME" in
            *a*|*b*|*rc*) PRERELEASE_FLAG="--prerelease" ;;
          esac
          # Releases are immutable once published: every asset must land in
          # this single create call, and an existing release cannot be
          # completed after the fact.
          if gh release view "$REF_NAME" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "A release for $REF_NAME already exists and immutable releases" >&2
            echo "cannot be modified. Delete it (if permitted) or cut a new version." >&2
            exit 1
          fi
          gh release create "${{ github.ref_name }}" \
            dist/* sbom.json constraints.txt SHA256SUMS.txt \
            dmgs/Librarian-AppleSilicon/Librarian-AppleSilicon.dmg \
            dmgs/Librarian-Intel/Librarian-Intel.dmg \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes-file release-notes.md \
            --verify-tag \
            $PRERELEASE_FLAG
