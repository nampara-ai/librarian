name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Secret scan
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            zricethezav/gitleaks:v8.30.1 \
            detect --source . --no-banner --redact --verbose

  build:
    needs: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install system OCR tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends poppler-utils tesseract-ocr
      - name: Install
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade "pip>=26.1"
          .venv/bin/pip install -e ".[dev,all]"
      - name: Verify release tag matches package version
        run: |
          .venv/bin/python - <<'PY'
          import os
          import sys

          from librarian.version import __version__

          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{__version__}"
          if tag != expected:
              print(f"release tag {tag!r} does not match package version {expected!r}")
              sys.exit(1)
          PY
      - name: Verify changelog is ready for release
        run: .venv/bin/python .github/scripts/check_changelog_ready.py --version "$GITHUB_REF_NAME"
      - name: Doctor
        run: .venv/bin/librarian doctor --strict
      - name: Check
        run: |
          .venv/bin/ruff check .
          .venv/bin/pyright
          .venv/bin/pytest
      - name: Dependency audit
        run: .venv/bin/pip-audit --progress-spinner off --skip-editable
      - name: Build distributions
        run: |
          rm -rf dist
          .venv/bin/python -m build
      - name: Export dependency constraints
        run: .venv/bin/python .github/scripts/export_constraints.py --output constraints.txt
      - name: Smoke install wheel
        run: |
          python -m venv "$RUNNER_TEMP/librarian-wheel-smoke"
          WHEEL="$(ls dist/*.whl)"
          "$RUNNER_TEMP/librarian-wheel-smoke/bin/python" -m pip install -c constraints.txt "$WHEEL[all]"
          "$RUNNER_TEMP/librarian-wheel-smoke/bin/librarian" version
      - name: Attest distributions
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: "dist/*"
      - name: Generate SBOM
        run: .venv/bin/cyclonedx-py environment --output-format JSON --output-file sbom.json
      - name: Generate checksums
        run: sha256sum dist/* sbom.json constraints.txt > SHA256SUMS.txt
      - name: Verify checksums
        run: sha256sum --check SHA256SUMS.txt
      - name: Attest release metadata
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            sbom.json
            constraints.txt
            SHA256SUMS.txt
      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ github.ref_name }}
          retention-days: 30
          path: |
            dist/*
            sbom.json
            constraints.txt
            SHA256SUMS.txt
      - name: Login to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          docker build -t "$IMAGE:${{ github.ref_name }}" .
      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
          format: "sarif"
          output: "trivy-image.sarif"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          exit-code: "1"
      - name: Upload image scan
        if: ${{ always() && hashFiles('trivy-image.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-image.sarif"
      - name: Push image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          docker push "$IMAGE:${{ github.ref_name }}"
          case "${{ github.ref_name }}" in
            *a*|*b*|*rc*) ;;
            *)
              docker tag "$IMAGE:${{ github.ref_name }}" "$IMAGE:latest"
              docker push "$IMAGE:latest"
              ;;
          esac
      - name: Resolve image digest
        id: image-digest
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          DIGEST="$(docker buildx imagetools inspect "$IMAGE:${{ github.ref_name }}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
      - name: Attest image
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: "ghcr.io/${{ github.repository }}"
          subject-digest: "${{ steps.image-digest.outputs.digest }}"
          push-to-registry: true
      - name: Extract release notes
        run: .venv/bin/python .github/scripts/release_notes.py --version "${{ github.ref_name }}" --output release-notes.md
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          PRERELEASE_FLAG=""
          case "$REF_NAME" in
            *a*|*b*|*rc*) PRERELEASE_FLAG="--prerelease" ;;
          esac
          gh release create "${{ github.ref_name }}" dist/* sbom.json constraints.txt SHA256SUMS.txt \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes-file release-notes.md \
            --verify-tag \
            $PRERELEASE_FLAG
