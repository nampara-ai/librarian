name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system OCR tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends poppler-utils tesseract-ocr
      - name: Install
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -e ".[dev,all]"
      - name: Doctor
        run: .venv/bin/librarian doctor --strict
      - name: Ruff
        run: .venv/bin/ruff check .
      - name: Dependency audit
        run: .venv/bin/pip-audit --progress-spinner off --skip-editable
      - name: Pytest
        run: .venv/bin/pytest
      - name: Pyright
        run: .venv/bin/pyright
      - name: Build distributions
        run: |
          rm -rf dist
          .venv/bin/python -m build
      - name: Smoke install wheel
        run: |
          python -m venv "$RUNNER_TEMP/librarian-wheel-smoke"
          "$RUNNER_TEMP/librarian-wheel-smoke/bin/python" -m pip install dist/*.whl
          "$RUNNER_TEMP/librarian-wheel-smoke/bin/librarian" version
      - name: Docker build
        run: docker build -t librarian-ci .
