name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install
        run: python -m pip install -e ".[dev,all]"
      - name: Check
        run: |
          ruff check .
          pyright
          pytest
      - name: Build distributions
        run: python -m build
      - name: Generate SBOM
        run: cyclonedx-py environment --output-format JSON --output-file sbom.json
      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: |
            dist/*
            sbom.json
      - name: Login to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          docker build -t "$IMAGE:${{ github.ref_name }}" .
      - name: Push image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          docker push "$IMAGE:${{ github.ref_name }}"
          case "${{ github.ref_name }}" in
            *a*|*b*|*rc*) ;;
            *)
              docker tag "$IMAGE:${{ github.ref_name }}" "$IMAGE:latest"
              docker push "$IMAGE:latest"
              ;;
          esac
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          PRERELEASE_FLAG=""
          case "$REF_NAME" in
            *a*|*b*|*rc*) PRERELEASE_FLAG="--prerelease" ;;
          esac
          gh release create "${{ github.ref_name }}" dist/* sbom.json \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes-file CHANGELOG.md \
            $PRERELEASE_FLAG
