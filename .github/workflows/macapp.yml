name: Mac App

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  dmg:
    runs-on: macos-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            artifact: Librarian-AppleSilicon
          - arch: x86_64
            artifact: Librarian-Intel
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build backend wheel
        run: |
          python -m pip install --upgrade build
          python -m build --wheel

      - name: Ensure Rosetta 2 (x86_64 backend on Apple Silicon runner)
        if: matrix.arch == 'x86_64'
        run: sudo softwareupdate --install-rosetta --agree-to-license || true

      - name: Build app bundle
        working-directory: apps/macos
        run: make app ARCH_FLAGS="--arch ${{ matrix.arch }}"

      - name: Bundle backend
        working-directory: apps/macos
        run: |
          scripts/bundle_backend.sh \
            --app dist/Librarian.app \
            --wheel "$(ls ../../dist/nampara_librarian-*.whl)" \
            --arch ${{ matrix.arch }}

      - name: Check for signing identity
        id: signing
        env:
          CERT: ${{ secrets.MACOS_SIGNING_CERT_P12_BASE64 }}
        run: |
          if [ -n "$CERT" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Developer ID certificate
        if: steps.signing.outputs.enabled == 'true'
        env:
          CERT: ${{ secrets.MACOS_SIGNING_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$CERT" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign
          rm certificate.p12
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Sign app (Developer ID)
        if: steps.signing.outputs.enabled == 'true'
        working-directory: apps/macos
        env:
          IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: scripts/sign_app.sh --app dist/Librarian.app --identity "$IDENTITY"

      - name: Sign app (ad-hoc)
        if: steps.signing.outputs.enabled != 'true'
        working-directory: apps/macos
        run: scripts/sign_app.sh --app dist/Librarian.app

      - name: Create DMG
        working-directory: apps/macos
        run: scripts/make_dmg.sh --app dist/Librarian.app --output "dist/${{ matrix.artifact }}.dmg"

      - name: Notarize and staple
        if: steps.signing.outputs.enabled == 'true'
        working-directory: apps/macos
        env:
          APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
          APP_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_APP_PASSWORD }}
        run: |
          xcrun notarytool submit "dist/${{ matrix.artifact }}.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APP_PASSWORD" \
            --wait
          xcrun stapler staple "dist/${{ matrix.artifact }}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: apps/macos/dist/${{ matrix.artifact }}.dmg
          if-no-files-found: error

      - name: Attach DMG to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG" \
            "apps/macos/dist/${{ matrix.artifact }}.dmg" --clobber \
          || gh release create "$TAG" \
            "apps/macos/dist/${{ matrix.artifact }}.dmg" \
            --title "$TAG" --notes "Librarian $TAG"
