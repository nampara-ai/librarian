name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system OCR tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends poppler-utils tesseract-ocr
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"
      - name: Doctor
        run: librarian doctor --strict
      - name: Ruff
        run: ruff check .
      - name: Dependency audit
        run: pip-audit --progress-spinner off --skip-editable
      - name: Pytest
        run: pytest
      - name: Example corpus eval
        run: |
          librarian corpus-eval examples/corpus_eval_cases.json \
            --output-dir "$(mktemp -d)" \
            --output "$(mktemp)"
      - name: Synthetic corpus eval
        run: |
          librarian corpus-eval examples/synthetic-corpus/corpus_eval_cases.json \
            --output-dir "$(mktemp -d)" \
            --output "$RUNNER_TEMP/ci-corpus-eval.json" \
            --overwrite
      - name: Example prompt eval
        run: librarian eval examples/eval_cases.json --output "$RUNNER_TEMP/ci-eval.json"
      - name: Example benchmark
        run: |
          librarian benchmark --input-path examples/benchmark_text.txt --repeats 1 \
            --output "$RUNNER_TEMP/ci-benchmark.json"
      - name: Verify example evidence
        run: |
          VERSION="v$(python -c 'from librarian.version import __version__; print(__version__)')"
          python .github/scripts/verify_release_evidence.py \
            --eval "$RUNNER_TEMP/ci-eval.json" \
            --corpus-eval "$RUNNER_TEMP/ci-corpus-eval.json" \
            --benchmark "$RUNNER_TEMP/ci-benchmark.json" \
            --version "$VERSION" \
            --min-corpus-cases 13 \
            --min-corpus-search-recall 1.0 \
            --min-corpus-output-ratio 0.05 \
            --min-benchmark-cps 1000 \
            --min-benchmark-runs 1
      - name: Pyright
        run: pyright
      - name: Build distributions
        run: |
          rm -rf dist
          python -m build
      - name: Smoke install wheel
        run: |
          python -m venv "$RUNNER_TEMP/librarian-wheel-smoke"
          "$RUNNER_TEMP/librarian-wheel-smoke/bin/python" -m pip install dist/*.whl
          "$RUNNER_TEMP/librarian-wheel-smoke/bin/librarian" version
      - name: Docker build
        run: docker build -t librarian-ci .
