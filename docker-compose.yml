services:
  api:
    build: .
    command: librarian api --host 0.0.0.0 --port 8080
    environment:
      LIBRARIAN_API_HOST: 0.0.0.0
      LIBRARIAN_API_PORT: 8080
      LIBRARIAN_API_KEY: ${LIBRARIAN_API_KEY:?Set LIBRARIAN_API_KEY before starting Compose}
      LIBRARIAN_API_IMPORT_ROOT: /data/imports
      LIBRARIAN_DATA_DIR: /data
      LIBRARIAN_DATABASE_PATH: /data/librarian.sqlite
      LIBRARIAN_JOB_BACKEND: sqlite
      LIBRARIAN_LOG_FORMAT: json
    ports:
      - "8080:8080"
    volumes:
      - librarian-data:/data
    restart: unless-stopped
    stop_grace_period: 30s
    init: true
    pids_limit: 512
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/ready', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build: .
    command: librarian worker
    environment:
      LIBRARIAN_DATA_DIR: /data
      LIBRARIAN_DATABASE_PATH: /data/librarian.sqlite
      LIBRARIAN_API_IMPORT_ROOT: /data/imports
      LIBRARIAN_JOB_BACKEND: sqlite
      LIBRARIAN_LOG_FORMAT: json
    volumes:
      - librarian-data:/data
    restart: unless-stopped
    stop_grace_period: 5m
    init: true
    pids_limit: 512
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      api:
        condition: service_healthy

volumes:
  librarian-data:
