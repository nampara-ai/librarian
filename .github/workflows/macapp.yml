name: Mac App

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    tags: ["v*"]
  # Build the app on every PR that touches it, so Swift never meets the
  # compiler for the first time on an immutable release tag.
  pull_request:
    paths:
      - "apps/macos/**"
      - ".github/workflows/macapp.yml"

permissions:
  contents: write

jobs:
  dmg:
    runs-on: macos-14
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # Both DMGs build on plentiful Apple Silicon runners. The arm64
          # binaries come from the native Homebrew; the x86_64 binaries come
          # from an x86_64 Homebrew installed under Rosetta, so releases never
          # wait on (increasingly scarce) native Intel runners.
          - arch: arm64
            artifact: Librarian-AppleSilicon
            brew_prefix: /opt/homebrew
          - arch: x86_64
            artifact: Librarian-Intel
            brew_prefix: /usr/local
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build backend wheel
        run: |
          python -m pip install --upgrade build
          python -m build --wheel

      - name: Ensure Rosetta 2 (x86_64 build on Apple Silicon)
        if: matrix.arch == 'x86_64'
        run: sudo softwareupdate --install-rosetta --agree-to-license

      - name: Build app bundle
        working-directory: apps/macos
        run: make app ARCH_FLAGS="--arch ${{ matrix.arch }}"

      - name: Bundle backend
        working-directory: apps/macos
        run: |
          scripts/bundle_backend.sh \
            --app dist/Librarian.app \
            --wheel "$(ls ../../dist/nampara_librarian-*.whl)" \
            --arch ${{ matrix.arch }}

      - name: Install OCR tools (arm64 native Homebrew)
        if: matrix.arch == 'arm64'
        run: brew install tesseract poppler dylibbundler

      - name: Install OCR tools (x86_64 Homebrew under Rosetta)
        if: matrix.arch == 'x86_64'
        run: |
          # Bootstrap an x86_64 Homebrew at /usr/local (the installer picks the
          # prefix from the running architecture, so run it under Rosetta), then
          # install the Intel OCR binaries there.
          if [ ! -x /usr/local/bin/brew ]; then
            NONINTERACTIVE=1 arch -x86_64 /bin/bash -c \
              "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" </dev/null
          fi
          arch -x86_64 /usr/local/bin/brew install tesseract poppler dylibbundler

      - name: Bundle OCR tools
        working-directory: apps/macos
        run: |
          scripts/bundle_ocr.sh \
            --app dist/Librarian.app \
            --arch ${{ matrix.arch }} \
            --brew-prefix ${{ matrix.brew_prefix }}

      - name: Verify bundled OCR works end to end
        working-directory: apps/macos
        run: |
          # Exercise the exact production path — pdf2image (poppler) +
          # pytesseract (tesseract) + bundled tessdata + relocated dylibs —
          # from inside the app bundle, so a relocation or arch mistake fails
          # the PR build instead of an immutable release tag.
          APP="$PWD/dist/Librarian.app"
          PY="$APP/Contents/Resources/backend/python/bin/python3"
          export PATH="$APP/Contents/Resources/ocr/bin:$PATH"
          export TESSDATA_PREFIX="$APP/Contents/Resources/ocr/share/tessdata"
          tesseract --version
          pdfinfo -v
          "$PY" <<'CHECK'
          # Build a minimal valid PDF (standard Helvetica, correct xref) without
          # Pillow's PDF writer, which needs a JPEG encoder the bundled runtime
          # lacks. Then run the exact production chain: pdf2image (pdftoppm) ->
          # tesseract, proving the relocated binaries and bundled tessdata work.
          objects = [
              b"<< /Type /Catalog /Pages 2 0 R >>",
              b"<< /Type /Pages /Kids [3 0 R] /Count 1 >>",
              b"<< /Type /Page /Parent 2 0 R /MediaBox [0 0 612 220] "
              b"/Resources << /Font << /F1 4 0 R >> >> /Contents 5 0 R >>",
              b"<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>",
          ]
          stream = b"BT /F1 60 Tf 40 90 Td (LIBRARIAN OCR) Tj ET"
          objects.append(b"<< /Length %d >>\nstream\n%s\nendstream" % (len(stream), stream))

          pdf = b"%PDF-1.4\n"
          offsets = []
          for index, obj in enumerate(objects, start=1):
              offsets.append(len(pdf))
              pdf += b"%d 0 obj\n%s\nendobj\n" % (index, obj)
          xref_pos = len(pdf)
          pdf += b"xref\n0 %d\n0000000000 65535 f \n" % (len(objects) + 1)
          for off in offsets:
              pdf += b"%010d 00000 n \n" % off
          pdf += b"trailer\n<< /Size %d /Root 1 0 R >>\nstartxref\n%d\n%%%%EOF\n" % (
              len(objects) + 1,
              xref_pos,
          )
          with open("ocrcheck.pdf", "wb") as handle:
              handle.write(pdf)

          import pdf2image
          import pytesseract

          pages = pdf2image.convert_from_path("ocrcheck.pdf", dpi=200)
          text = pytesseract.image_to_string(pages[0]).upper()
          assert "LIBRARIAN" in text, f"OCR did not read the test PDF: {text!r}"
          print("bundled OCR OK:", text.strip())
          CHECK

      - name: Verify bundled runtime can reach AI providers
        working-directory: apps/macos
        run: |
          # The x86_64 interpreter runs under Rosetta here, same as during
          # bundling. A 401 proves DNS, TCP, and TLS all work from the
          # bundled runtime; certificate failures or timeouts fail the build.
          PY="dist/Librarian.app/Contents/Resources/backend/python/bin/python3"
          "$PY" <<'CHECK'
          import urllib.error
          import urllib.request

          try:
              urllib.request.urlopen("https://api.anthropic.com/v1/models", timeout=15)
          except urllib.error.HTTPError as error:
              assert error.code in (401, 403), f"unexpected status {error.code}"
              print("bundled runtime TLS + connectivity OK: HTTP", error.code)
          CHECK

      - name: Check for signing identity
        id: signing
        env:
          CERT: ${{ secrets.MACOS_SIGNING_CERT_P12_BASE64 }}
        run: |
          if [ -n "$CERT" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Developer ID certificate
        if: steps.signing.outputs.enabled == 'true'
        env:
          CERT: ${{ secrets.MACOS_SIGNING_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$CERT" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign
          rm certificate.p12
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Sign app (Developer ID)
        if: steps.signing.outputs.enabled == 'true'
        working-directory: apps/macos
        env:
          IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: scripts/sign_app.sh --app dist/Librarian.app --identity "$IDENTITY"

      - name: Sign app (ad-hoc)
        if: steps.signing.outputs.enabled != 'true'
        working-directory: apps/macos
        run: scripts/sign_app.sh --app dist/Librarian.app

      - name: Create DMG
        working-directory: apps/macos
        run: scripts/make_dmg.sh --app dist/Librarian.app --output "dist/${{ matrix.artifact }}.dmg"

      - name: Notarize and staple
        if: steps.signing.outputs.enabled == 'true'
        working-directory: apps/macos
        env:
          APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
          APP_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_APP_PASSWORD }}
        run: |
          xcrun notarytool submit "dist/${{ matrix.artifact }}.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APP_PASSWORD" \
            --wait
          xcrun stapler staple "dist/${{ matrix.artifact }}.dmg"

      # Releases are immutable once published, so DMGs cannot be attached
      # after the fact. Tag builds publish the DMG as a workflow artifact;
      # the Release workflow collects both artifacts and includes them in
      # its single atomic `gh release create`.
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: apps/macos/dist/${{ matrix.artifact }}.dmg
          if-no-files-found: error
