name: Bug Report
description: Report a reproducible Librarian bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Exact commands, inputs, or API calls needed to reproduce.
      placeholder: |
        librarian import ./input --format md --process
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Python:
        Librarian version/commit:
        Install method:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Redact secrets and private document text before posting.
      render: text
