services:
  api:
    build: .
    command: librarian api --host 0.0.0.0 --port 8080
    environment:
      LIBRARIAN_API_HOST: 0.0.0.0
      LIBRARIAN_API_PORT: 8080
      LIBRARIAN_API_KEY: ${LIBRARIAN_API_KEY:?Set LIBRARIAN_API_KEY before starting Compose}
      LIBRARIAN_API_IMPORT_ROOT: /data/imports
      LIBRARIAN_DATA_DIR: /data
      LIBRARIAN_DATABASE_PATH: /data/librarian.sqlite
      LIBRARIAN_JOB_BACKEND: sqlite
      LIBRARIAN_LOG_FORMAT: json
    ports:
      - "8080:8080"
    volumes:
      - librarian-data:/data

  worker:
    build: .
    command: librarian worker
    environment:
      LIBRARIAN_DATA_DIR: /data
      LIBRARIAN_DATABASE_PATH: /data/librarian.sqlite
      LIBRARIAN_API_IMPORT_ROOT: /data/imports
      LIBRARIAN_JOB_BACKEND: sqlite
      LIBRARIAN_LOG_FORMAT: json
    volumes:
      - librarian-data:/data
    depends_on:
      - api

volumes:
  librarian-data:
